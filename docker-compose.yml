services:
  postgres:
    image: postgres:15-alpine
    container_name: skylive_db
    environment:
      POSTGRES_USER: skylive
      POSTGRES_PASSWORD: skylive_password
      POSTGRES_DB: skylive_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skylive -d skylive_db"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7-alpine
    container_name: skylive_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  rtmp:
    image: tiangolo/nginx-rtmp
    container_name: skylive_rtmp
    ports:
      - "1935:1935"
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - hls_data:/tmp/hls
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
  api:
    build: ./apps/api
    container_name: skylive_api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://skylive:skylive_password@postgres:5432/skylive_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - hls_data:/tmp/hls
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3001/api/health',res=>process.exit(res.statusCode===200?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
  client:
    build: ./apps/client
    container_name: skylive_client
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_WS_URL: http://localhost:3001
      NEXT_PUBLIC_HLS_BASE: http://localhost:8080/hls
    depends_on:
      - api
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:3000',res=>process.exit(res.statusCode>=200&&res.statusCode<500?0:1)).on('error',()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
volumes:
  postgres_data:
  hls_data:
