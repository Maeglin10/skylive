name: api-ci

on:
  push:
    paths:
      - 'apps/api/**'
      - 'apps/api/prisma/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/api/prisma/**'
      - '.github/workflows/api-ci.yml'

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install deps (api only)
        run: pnpm --filter api... install
      - name: Lint
        run: pnpm --filter api... lint
      - name: Tests
        run: pnpm --filter api... test
