name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================================
  # Job 1: Lint and Type Check (runs in parallel)
  # ============================================================================
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint all packages
        run: pnpm -r lint

      - name: Type check client
        run: pnpm -C apps/client exec tsc --noEmit

  # ============================================================================
  # Job 2: Test API (runs in parallel)
  # ============================================================================
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: skylive_test
          POSTGRES_USER: skylive
          POSTGRES_PASSWORD: skylive_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U skylive"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm -C apps/api exec prisma generate
        env:
          DATABASE_URL: postgresql://skylive:skylive_test@localhost:5432/skylive_test

      - name: Run database migrations
        run: pnpm -C apps/api exec prisma migrate deploy
        env:
          DATABASE_URL: postgresql://skylive:skylive_test@localhost:5432/skylive_test

      - name: Run API tests
        run: pnpm -C apps/api test -- --passWithNoTests
        env:
          DATABASE_URL: postgresql://skylive:skylive_test@localhost:5432/skylive_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-jwt-secret-32-chars-minimum-xxxx
          JWT_REFRESH_SECRET: test-refresh-secret-32-chars-minimum-xx
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
          NODE_ENV: test

  # ============================================================================
  # Job 3: Build (depends on lint-and-type-check + test-api)
  # ============================================================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, test-api]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r build
